<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visor de Lotes — Inmobiliaria</title>

  <!-- Mapbox -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS local -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <div class="app">
    <header>
      <div class="brand">
        <img src="assets/imagenes/logos/logo.png" class="logo-empresa" alt="Casagrande" />
        <div class="brand-dot"></div>
        <span class="brand-name">Visor Inmobiliario</span>
        
      </div>

      <div class="header-status">
        <div class="status-dot"></div>
        Mapa activo
      </div>
    </header>

    <div class="main">
      <div id="map">
        <div class="map-loader" id="mapLoader">
          <div class="loader-ring"></div>
          <span class="loader-text">Cargando mapa satelital...</span>
        </div>

        <!-- Control profesional de opacidad del plano -->
        <div class="map-control">
          <div class="map-control-title">🗺 Plano del proyecto</div>

          <div class="map-control-row">
            <span class="map-control-label">Opacidad</span>
            <span class="map-control-value" id="opacityVal">80%</span>
          </div>

          <input 
            type="range" 
            id="opacitySlider" 
            min="0" 
            max="100" 
            value="80"
          >

          <!-- ✅ SOLO EDITOR: Exportar JSON -->
          <button id="exportBtn" class="map-control-btn" type="button">
            ⬇️ Exportar proyecto (JSON)
          </button>
        </div>

        <!-- Leyenda -->
        <div class="legend">
          <div class="legend-title">Estado</div>
          <div class="legend-list">
            <div class="legend-item"><span class="legend-swatch disponible"></span>Disponible</div>
            <div class="legend-item"><span class="legend-swatch reservado"></span>Reservado</div>
            <div class="legend-item"><span class="legend-swatch vendido"></span>Vendido</div>
          </div>
        </div>

        <!-- POPUP LOTE (vacío; lo llena popup.js) -->
        <div id="lote-popup" class="hidden"></div>
      </div>
    </div>
  </div>

  <!-- ✅ MODO EDITOR -->
  <script>
    window.LOTEVISTA_MODE = "editor";
  </script>

  <!-- JS (entrypoint) -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
